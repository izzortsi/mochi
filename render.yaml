# Render Blueprint for the mochi study-plan app.
#
# Provisions two Web Services (backend + frontend) and one persistent Disk
# mounted on the backend. State (JSON files, OCR cache, OAuth tokens, PDF
# uploads) all lives under /data so it survives deploys and restarts.
#
# After applying this blueprint:
#   1. Set BACKEND_URL and NEXT_PUBLIC_WS_URL on the frontend service in
#      the Render dashboard, pointing at the backend's public URL.
#   2. Seed /data/anthropic-oauth/tokens.json on the backend (see DEPLOY.md).
#   3. Optionally seed initial data into /data/{courses,notes,...}.json.

services:
  # ---------------------------------------------------------------------
  # Backend — FastAPI on uvicorn, with the persistent Disk
  # ---------------------------------------------------------------------
  - type: web
    name: mochi-backend
    runtime: python
    plan: starter
    rootDir: backend
    # uv is the package manager declared in pyproject.toml; install it
    # then sync the locked dependencies (no dev deps in production).
    buildCommand: pip install --upgrade uv && uv sync --no-dev
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/progress
    autoDeploy: true
    disk:
      name: mochi-data
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: SP_DATA_DIR
        value: /data
      - key: SP_PDFS_DIR
        value: /data/pdfs
      - key: SP_OAUTH_TOKEN_PATH
        value: /data/anthropic-oauth/tokens.json
      # Optional rebuild-resilient seed for the anthropic-oauth token file.
      # Set this in the Render dashboard (sync: false → not committed) to
      # the JSON contents of your local ~/.config/anthropic-oauth/tokens.json.
      # On startup the backend writes it to SP_OAUTH_TOKEN_PATH IF that file
      # is missing, so a wiped disk recovers without a shell paste.
      - key: SP_OAUTH_TOKENS_JSON
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.6

  # ---------------------------------------------------------------------
  # Frontend — Next.js production server
  # ---------------------------------------------------------------------
  - type: web
    name: mochi-frontend
    runtime: node
    plan: starter
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      # Server-side proxy target — read by next.config.js at startup.
      # Set in dashboard to the backend's public URL once both services
      # have been provisioned (e.g. https://mochi-backend.onrender.com).
      - key: BACKEND_URL
        sync: false
      # Browser-side WebSocket URL — baked into the client bundle by
      # next build, so it must be set BEFORE the first build runs.
      # Use the wss:// scheme on Render (TLS terminated at the edge).
      # e.g. wss://mochi-backend.onrender.com/ws
      - key: NEXT_PUBLIC_WS_URL
        sync: false
